<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>送信完了 | AI集客ドットコム</title>
<meta name="robots" content="noindex,nofollow" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet" />
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0d1f3c;color:#fff;font-family:'Noto Sans JP',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
  .card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:24px;padding:48px 36px;max-width:480px;width:100%}
  .icon{font-size:64px;margin-bottom:20px}
  h1{font-size:22px;font-weight:900;margin-bottom:12px;line-height:1.5}
  p{font-size:14px;color:rgba(255,255,255,.65);line-height:1.9;margin-bottom:8px}
  .back{display:inline-block;margin-top:32px;background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;text-decoration:none;border-radius:12px;padding:13px 28px;font-weight:800;font-size:14px;transition:.2s}
  .back:hover{opacity:.88}
</style>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <h1>送信が完了しました</h1>
    <p>お問い合わせありがとうございます。</p>
    <p>通常2営業日以内に<br>ご入力いただいたメールアドレスへご返信いたします。</p>
    <a class="back" href="/">トップページに戻る</a>
  </div>
</body>
</html>
